<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>六小象·安装包下载</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬇️</text></svg>" />
  <style>
    :root {
      --primary: #2563eb;
      --primary-light: #dbeafe;
      --accent: #0ea5e9;
      --success: #10b981;
      --warning: #f59e0b;
      --code-bg: #0f172a;
      --code-text: #e2e8f0;
      --bg: #f0f6ff;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    .page-header {
      background: linear-gradient(135deg, #1e40af 0%, #0ea5e9 100%);
      border-radius: 16px;
      padding: 28px 32px;
      margin-bottom: 24px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 18px;
      box-shadow: 0 8px 32px rgba(37,99,235,.25);
    }

    .header-icon {
      width: 58px;
      height: 58px;
      background: rgba(255,255,255,.15);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      flex-shrink: 0;
    }

    .page-header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: .4px;
    }

    .page-header p {
      font-size: 13px;
      opacity: .8;
      margin-top: 4px;
      line-height: 1.5;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 28px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,.05);
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--primary-light);
    }

    .card-title .step-badge {
      width: 28px;
      height: 28px;
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .download-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .download-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      transition: all .25s ease;
    }

    .download-item:hover {
      border-color: var(--primary);
      background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
      transform: translateX(4px);
      box-shadow: 0 4px 16px rgba(37,99,235,.12);
    }

    .download-icon {
      width: 42px;
      height: 42px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .download-info {
      flex: 1;
      min-width: 0;
    }

    .download-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }

    .download-platform {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .download-arrow {
      font-size: 16px;
      color: var(--primary);
      font-weight: 600;
      opacity: 0;
      transition: opacity .25s, transform .25s;
    }

    .download-item:hover .download-arrow {
      opacity: 1;
      transform: translateX(3px);
    }

    .qr-btn {
      width: 32px;
      height: 32px;
      background: #f1f5f9;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all .2s;
      flex-shrink: 0;
    }

    .qr-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      transform: scale(1.1);
    }

    .single-qr-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .single-qr-modal.active {
      display: flex;
    }

    .single-qr-content {
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      text-align: center;
      max-width: 300px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      position: relative;
    }

    .single-qr-close {
      position: absolute;
      top: 10px; right: 10px;
      width: 28px; height: 28px;
      border: none;
      background: #f1f5f9;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }

    .single-qr-close:hover {
      background: #fee2e2;
      color: #ef4444;
    }

    .single-qr-img {
      width: 180px;
      height: 180px;
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
      margin: 10px auto 14px;
    }

    .single-qr-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .single-qr-platform {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .single-qr-url {
      font-size: 11px;
      color: var(--primary);
      margin-top: 10px;
      word-break: break-all;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 36px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      padding-bottom: 12px;
    }

    @media (max-width: 600px) {
      body { padding: 16px 10px; }

      .page-header {
        padding: 20px 18px;
        gap: 14px;
        border-radius: 12px;
      }

      .header-icon {
        width: 48px;
        height: 48px;
        font-size: 24px;
        border-radius: 12px;
      }

      .page-header h1 { font-size: 17px; }
      .page-header p  { font-size: 12px; }

      .card {
        padding: 18px 14px;
        border-radius: 12px;
      }

      .card-title { font-size: 14px; }

      .download-item {
        padding: 12px 14px;
        gap: 12px;
      }

      .download-icon {
        width: 36px;
        height: 36px;
        font-size: 17px;
        border-radius: 8px;
      }

      .download-name { font-size: 13px; }
      .download-platform { font-size: 11px; }

      .download-arrow { display: none; }

      .qr-btn {
        width: 28px;
        height: 28px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <div class="header-icon">⬇️</div>
    <div>
      <h1>六小象·安装包下载</h1>

    </div>
  </div>

  <div class="card">
    <div class="card-title">

    </div>
    <div class="download-list">
      <a href="http://erz.cc/wpos" target="_blank" class="download-item">

      <a href="http://erz.cc/winahk" target="_blank" class="download-item">

          <div class="download-platform">Windows</div>

        <button class="qr-btn" onclick="showQr('http://erz.cc/winahk','银台条码接收程序 / 防损插件','Windows')" title="查看二维码">📱</button>
        <div class="download-arrow">→</div>
      </a>
      <a href="http://erz.cc/andahk" target="_blank" class="download-item">
        <div class="download-icon">🤖</div>
        <div class="download-info">
          <div class="download-name">银台条码接收程序 / 防损插件</div>
          <div class="download-platform">Android</div>

        <button class="qr-btn" onclick="showQr('http://erz.cc/andahk','银台条码接收程序 / 防损插件','Android')" title="查看二维码">📱</button>
        <div class="download-arrow">→</div>
      </a>
      <a href="http://erz.cc/inventory" target="_blank" class="download-item">
        <div class="download-icon">📦</div>

  <div class="single-qr-modal" id="singleQrModal">
    <div class="single-qr-content">
      <button class="single-qr-close" onclick="closeQr()">✕</button>
      <img class="single-qr-img" id="singleQrImg" src="" alt="二维码" />
      <div class="single-qr-name" id="singleQrName"></div>

  <div class="footer">

<script>
  function showQr(url, name, platform) {
    event.preventDefault();
    event.stopPropagation();
    const encoded = encodeURIComponent(url);
    document.getElementById('singleQrImg').src = `https://api.qrserver.com/v1/create-qr-code/?data=${encoded}&size=200x200&margin=6`;
    document.getElementById('singleQrName').textContent = name;
    document.getElementById('singleQrPlatform').textContent = platform;
    document.getElementById('singleQrUrl').textContent = url;
    document.getElementById('singleQrModal').classList.add('active');
  }

  function closeQr() {
    document.getElementById('singleQrModal').classList.remove('active');
  }

  document.getElementById('singleQrModal').addEventListener('click', function(e) {
    if (e.target === this) closeQr();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeQr();
  });
</script>
</body>
</html>
