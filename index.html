<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>运维手册</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>" />
  <style>
    :root {
      --primary: #2563eb;
      --bg: #f0f6ff;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .page-header {
      background: linear-gradient(135deg, #1e40af 0%, #0ea5e9 100%);
      padding: 40px 20px;
      color: #fff;
      text-align: center;
      box-shadow: 0 8px 32px rgba(37,99,235,.25);
    }
    .header-icon { font-size: 64px; margin-bottom: 16px; }
    .page-header h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    .page-header p { font-size: 16px; opacity: .9; }
    .content-area {
      flex: 1;
      padding: 40px 20px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      align-content: flex-start;
    }
    .doc-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      transition: all .25s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,.06);
    }
    .doc-item:hover {
      border-color: var(--primary);
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(37,99,235,.18);
    }
    .doc-icon {
      width: 56px;
      height: 56px;
      background: var(--primary);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }
    .doc-info { flex: 1; min-width: 0; }
    .doc-name {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .doc-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .doc-arrow {
      font-size: 20px;
      color: var(--primary);
      opacity: 0;
      transition: opacity .25s;
    }
    .doc-item:hover .doc-arrow { opacity: 1; }
    .footer {
      text-align: center;
      font-size: 13px;
      color: #94a3b8;
      padding: 24px 20px;
      border-top: 1px solid var(--border);
    }
    @media (max-width: 768px) {
      .page-header { padding: 30px 16px; }
      .header-icon { font-size: 52px; }
      .page-header h1 { font-size: 24px; }
      .page-header p { font-size: 14px; }
      .content-area {
        padding: 24px 12px;
        grid-template-columns: 1fr;
        max-width: 500px;
      }
      .doc-item {
        padding: 20px;
        gap: 14px;
      }
      .doc-icon {
        width: 50px;
        height: 50px;
        font-size: 24px;
      }
      .doc-name { font-size: 15px; }
      .doc-desc { font-size: 13px; }
    }
    @media (max-width: 420px) {
      .page-header { padding: 24px 12px; }
      .header-icon { font-size: 44px; }
      .page-header h1 { font-size: 20px; }
      .doc-item { padding: 16px; }
      .doc-icon { width: 44px; height: 44px; font-size: 22px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <div class="header-icon">📚</div>
    <h1>运维手册</h1>
    <p>设备配置与维护指南</p>
  </div>

  <div class="content-area">
    <a href="六小象黑盒子 · 修改固定 IP.html" class="doc-item">
      <div class="doc-icon">🌐</div>
      <div class="doc-info">
        <div class="doc-name">六小象黑盒子 · 修改固定 IP</div>
        <div class="doc-desc">通过 SSH 登录，使用 Netplan 为设备配置静态 IP 地址</div>
      </div>
      <div class="doc-arrow">→</div>
    </a>

    <a href="六小象·安装包下载.html" class="doc-item">
      <div class="doc-icon">⬇️</div>
      <div class="doc-info">
        <div class="doc-name">六小象·安装包下载</div>
        <div class="doc-desc">飞像插件、聚像、智像、条码接收程序等安装包下载</div>
      </div>
      <div class="doc-arrow">→</div>
    </a>
  </div>

  <div class="footer">
    运维文档 · 仅供内部使用
  </div>
</div>
</body>
</html>
